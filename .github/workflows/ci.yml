name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-gate:
    name: Release Gate / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Release Check
        run: npm run release:check
