name: Bug report
description: Report a reproducible AgentCraft bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest code sample or command sequence that reproduces the issue.
      placeholder: |
        1. Configure...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentCraft version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "20.11.1"
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider used
      placeholder: "openai:gpt-4o-mini"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, stack traces, config snippets, or related links. Redact secrets.
