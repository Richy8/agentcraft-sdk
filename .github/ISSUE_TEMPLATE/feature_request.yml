name: Feature request
description: Propose a capability or API improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem should AgentCraft solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or docs you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or rejected?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, related packages, or prior art.
